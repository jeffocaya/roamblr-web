<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you · roamblr</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fbfaf8] text-[#151515] min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full text-center">
        <!-- Success Icon -->
        <div class="w-24 h-24 bg-[#c4511c] bg-opacity-10 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check-circle text-5xl text-[#c4511c]"></i>
        </div>

        <!-- Dynamic Title -->
        <h1 class="text-3xl font-bold mb-3" id="thankYouMessage">Thank you!</h1>
        
        <!-- Dynamic Message -->
        <p class="text-[#5a5a5a] mb-8" id="nextStepsMessage">Your request has been received.</p>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <!-- Updated paths -->
            <a href="/roamblr-web/index.html" class="bg-[#151515] hover:bg-[#3a3a3a] text-white px-6 py-3 rounded-full font-semibold transition">
                <i class="fas fa-home mr-2"></i> Home
            </a>
            <a href="/roamblr-web/dashboard/traveler.html" class="border border-[#151515] hover:bg-[#151515] hover:text-white px-6 py-3 rounded-full font-semibold transition" id="dashboardLink">
                <i class="fas fa-user mr-2"></i> My Dashboard
            </a>
        </div>

        <!-- Login prompt for non-logged users -->
        <p class="text-xs text-[#6f6f6f] mt-6" id="loginPrompt">
            <!-- Updated path -->
            <a href="/roamblr-web/auth/login.html" class="text-[#c4511c] hover:underline">Sign in</a> to track your requests
        </p>
    </div>

    <script type="module">
        import { auth, onAuthStateChanged } from '/roamblr-web/js/firebase.js';

        // Get type from URL
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'default';
        
        // Messages for different scenarios
        const messages = {
            'apply': {
                title: 'Application submitted!',
                text: 'We\'ll review your profile and notify you within 48 hours.'
            },
            'request': {
                title: 'Request sent!',
                text: 'The creator will respond soon. Check your dashboard for updates.'
            },
            'notify': {
                title: 'You\'re on the list!',
                text: 'We\'ll email you when this city launches.'
            },
            'default': {
                title: 'Thank you!',
                text: 'Your request has been received.'
            }
        };

        // Update page with correct message
        const msg = messages[type] || messages.default;
        document.getElementById('thankYouMessage').textContent = msg.title;
        document.getElementById('nextStepsMessage').textContent = msg.text;

        // Check if user is logged in to show correct dashboard link
        onAuthStateChanged(auth, (user) => {
            const dashboardLink = document.getElementById('dashboardLink');
            const loginPrompt = document.getElementById('loginPrompt');
            
            if (user) {
                // User is logged in - show dashboard link
                dashboardLink.classList.remove('hidden');
                loginPrompt.classList.add('hidden');
            } else {
                // User not logged in - show login prompt
                dashboardLink.classList.add('hidden');
                loginPrompt.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · roamblr</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fbfaf8]">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header - ALL PATHS UPDATED -->
        <div class="flex justify-between items-center mb-8">
            <a href="/roamblr-web/index.html" class="text-2xl font-bold">roam<span class="text-[#c4511c]">blr</span></a>
            <button id="logoutBtn" class="border border-[#151515] hover:bg-[#151515] hover:text-white px-5 py-2 rounded-full text-sm transition">
                <i class="fas fa-sign-out-alt mr-2"></i>Sign out
            </button>
        </div>

        <h1 class="text-3xl font-bold mb-8">Admin Dashboard</h1>
        
        <!-- Tabs -->
        <div class="flex gap-4 mb-8">
            <button onclick="loadPending()" class="px-6 py-2 bg-[#c4511c] text-white rounded-full">Pending</button>
            <button onclick="loadApproved()" class="px-6 py-2 border border-[#ddd8d0] rounded-full">Approved</button>
        </div>
        
        <!-- Creators List -->
        <div id="creatorsList" class="grid gap-4">
            <!-- Loaded by JavaScript -->
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, where, updateDoc, doc } from '/roamblr-web/js/firebase.js';
        import { logout, requireAuth } from '/roamblr-web/js/auth.js';

        // Only allow admin access - you'll need to set a user as admin manually in Firebase
        requireAuth();

        window.logout = logout;

        async function loadPending() {
            const q = query(collection(db, "creators"), where("status", "==", "pending"));
            const snapshot = await getDocs(q);
            renderCreators(snapshot.docs);
        }
        
        async function loadApproved() {
            const q = query(collection(db, "creators"), where("status", "==", "approved"));
            const snapshot = await getDocs(q);
            renderCreators(snapshot.docs);
        }
        
        function renderCreators(docs) {
            const container = document.getElementById('creatorsList');
            
            if (docs.length === 0) {
                container.innerHTML = '<p class="text-center py-12 text-[#6f6f6f]">No creators found</p>';
                return;
            }
            
            container.innerHTML = docs.map(doc => {
                const data = doc.data();
                return `
                    <div class="bg-white rounded-2xl p-6 border border-[#eeebe6]">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg">${data.name}</h3>
                                <p class="text-[#c4511c]">${data.city} · ${data.subs}</p>
                                <p class="text-sm mt-2">${data.bio ? data.bio.substring(0, 100) + '...' : ''}</p>
                                <div class="flex gap-2 mt-3">
                                    <a href="${data.channelLink}" target="_blank" class="text-sm text-[#c4511c]">Channel</a>
                                    <a href="${data.bestVideo}" target="_blank" class="text-sm text-[#c4511c]">Best video</a>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approveCreator('${doc.id}')" class="bg-green-600 text-white px-4 py-2 rounded-full text-sm hover:bg-green-700 transition">Approve</button>
                                <button onclick="rejectCreator('${doc.id}')" class="border border-red-600 text-red-600 px-4 py-2 rounded-full text-sm hover:bg-red-600 hover:text-white transition">Reject</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        window.approveCreator = async (id) => {
            await updateDoc(doc(db, "creators", id), { status: "approved" });
            loadPending();
        };
        
        window.rejectCreator = async (id) => {
            await updateDoc(doc(db, "creators", id), { status: "rejected" });
            loadPending();
        };
        
        // Load pending on page load
        loadPending();

        document.getElementById('logoutBtn').addEventListener('click', logout);
    </script>
</body>
</html>

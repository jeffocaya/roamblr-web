<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · roamblr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fbfaf8] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <a href="/index.html" class="block text-center mb-8">
            <span class="text-3xl font-bold">roam<span class="text-[#c4511c]">blr</span></span>
        </a>
        
        <div class="bg-white rounded-2xl p-8 shadow-sm border border-[#eeebe6]">
            <h1 class="text-2xl font-bold text-center mb-6">Welcome back</h1>
            
            <!-- Google Sign In -->
            <button id="googleSignIn" class="w-full border border-[#ddd8d0] hover:bg-[#f5f5f5] rounded-full py-3 px-4 flex items-center justify-center gap-2 transition mb-4">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
                <span>Continue with Google</span>
            </button>
            
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-[#eeebe6]"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-[#6f6f6f]">or</span>
                </div>
            </div>
            
            <!-- Email/Password Form -->
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" required class="w-full border border-[#ddd8d0] rounded-full px-5 py-3 outline-none focus:border-[#c4511c] transition">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" required class="w-full border border-[#ddd8d0] rounded-full px-5 py-3 outline-none focus:border-[#c4511c] transition">
                </div>
                
                <button type="submit" class="w-full bg-[#151515] hover:bg-[#3a3a3a] text-white font-semibold py-3 rounded-full transition">
                    Sign in
                </button>
            </form>
            
            <p class="text-center text-sm text-[#6f6f6f] mt-6">
                Don't have an account? 
                <a href="/auth/signup.html" class="text-[#c4511c] hover:underline">Sign up</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { signInWithGoogle, signInWithEmail } from '/js/auth.js';
        
        document.getElementById('googleSignIn').addEventListener('click', signInWithGoogle);
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            await signInWithEmail(email, password);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request intro · roamblr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fbfaf8]">
    <div class="max-w-2xl mx-auto px-4 py-8">
        <a href="/index.html" class="inline-block mb-8">
            <span class="text-2xl font-bold">roam<span class="text-[#c4511c]">blr</span></span>
        </a>

        <div class="bg-white rounded-2xl p-8 border border-[#eeebe6]">
            <h1 class="text-2xl font-bold mb-6">Request Intro</h1>
            
            <div id="creatorInfo" class="bg-[#f9f6f2] rounded-xl p-4 mb-6">
                <!-- Loaded by JavaScript -->
            </div>

            <form id="requestForm">
                <input type="hidden" id="creatorId" name="creatorId">
                
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Your name *</label>
                    <input type="text" id="travelerName" required class="w-full border border-[#ddd8d0] rounded-full px-5 py-3 outline-none focus:border-[#c4511c] transition">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">Travel dates *</label>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="arrivalDate" required class="border border-[#ddd8d0] rounded-full px-5 py-3 outline-none focus:border-[#c4511c] transition">
                        <input type="date" id="departureDate" required class="border border-[#ddd8d0] rounded-full px-5 py-3 outline-none focus:border-[#c4511c] transition">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">What do you want to film? *</label>
                    <textarea id="contentIdea" rows="4" required class="w-full border border-[#ddd8d0] rounded-2xl px-5 py-3 outline-none focus:border-[#c4511c] transition" placeholder="e.g. Street food tour, nightlife vlog..."></textarea>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Message to creator (optional)</label>
                    <textarea id="personalMessage" rows="3" class="w-full border border-[#ddd8d0] rounded-2xl px-5 py-3 outline-none focus:border-[#c4511c] transition"></textarea>
                </div>

                <button type="submit" class="w-full bg-[#c4511c] hover:bg-[#a33f12] text-white font-semibold py-4 rounded-full transition">
                    Send Request
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db, getCurrentUser, requireAuth } from '/js/auth.js';
        import { collection, addDoc, doc, getDoc, serverTimestamp } from '/js/firebase.js';

        requireAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const creatorId = urlParams.get('creator');

        // Load creator info
        async function loadCreatorInfo() {
            if (!creatorId) {
                window.location.href = '/directory.html';
                return;
            }

            const creatorDoc = await getDoc(doc(db, "creators", creatorId));
            if (!creatorDoc.exists()) {
                window.location.href = '/directory.html';
                return;
            }

            const creator = creatorDoc.data();
            document.getElementById('creatorId').value = creatorId;
            document.getElementById('creatorInfo').innerHTML = `
                <p class="font-semibold">Requesting intro to: ${creator.name}</p>
                <p class="text-sm text-[#c4511c]">${creator.city} · ${creator.subs}</p>
            `;
        }

        // Handle form submission
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = await getCurrentUser();
            if (!user) return;

            const request = {
                travelerId: user.uid,
                travelerName: document.getElementById('travelerName').value,
                creatorId: creatorId,
                arrivalDate: document.getElementById('arrivalDate').value,
                departureDate: document.getElementById('departureDate').value,
                contentIdea: document.getElementById('contentIdea').value,
                message: document.getElementById('personalMessage').value,
                status: 'pending',
                createdAt: serverTimestamp()
            };

            await addDoc(collection(db, "requests"), request);
            
            window.location.href = '/thanks.html?type=request';
        });

        loadCreatorInfo();
    </script>
</body>
</html>

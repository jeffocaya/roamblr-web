<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse cities · roamblr</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Loading States */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #c4511c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast Notifications */
        .toast-notification {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        
        .toast-notification:not(.translate-x-full) {
            transform: translateX(0);
        }
    </style>
</head>
<body class="bg-[#fbfaf8] text-[#151515]">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <!-- Navigation -->
        <nav class="flex flex-wrap items-center justify-between py-4 border-b border-[#eae7e2] mb-8">
            <a href="/roamblr-web/index.html" class="text-2xl font-bold">roam<span class="text-[#c4511c]">blr</span></a>
            <div class="flex items-center gap-4">
                <a href="/roamblr-web/about.html" class="text-[#2e2e2e] hover:text-[#c4511c]">About</a>
                <a href="/roamblr-web/auth/signup.html" class="border border-[#151515] hover:bg-[#151515] hover:text-white px-4 py-2 rounded-full text-sm">Get listed</a>
            </div>
        </nav>

        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Browse cities</h1>
            <p class="text-[#5a5a5a]">Find local creators in these cities</p>
        </div>

        <!-- Loading State with Skeleton Cards -->
        <div id="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Skeleton cards will be generated by JavaScript -->
        </div>

        <!-- Cities Grid (hidden initially) -->
        <div id="cities-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>

        <!-- Coming Soon Section -->
        <div class="mt-20 text-center border-t border-[#eae7e2] pt-16">
            <h2 class="text-3xl font-bold mb-3">Don't see your city?</h2>
            <p class="text-[#5a5a5a] mb-8 max-w-lg mx-auto">
                We're expanding to new cities every month. Leave your email and we'll notify you when we launch.
            </p>
            
            <div class="max-w-md mx-auto">
                <form id="notify-direct-form" class="flex flex-col sm:flex-row gap-3">
                    <input type="email" id="notify-email" placeholder="Enter your email" required 
                        class="flex-1 px-5 py-3 rounded-full border border-[#ddd8d0] outline-none focus:border-[#c4511c] transition">
                    <button type="submit" class="bg-[#c4511c] hover:bg-[#a33f12] text-white px-6 py-3 rounded-full font-semibold whitespace-nowrap transition">
                        <i class="fas fa-bell mr-2"></i> Notify me
                    </button>
                </form>
                <p class="text-xs text-[#6f6f6f] mt-3">We'll only email you about city launches. No spam.</p>
            </div>

            <!-- Popular requested cities -->
            <div class="flex flex-wrap gap-2 justify-center mt-8">
                <span class="text-sm text-[#6f6f6f]">Popular requests:</span>
                <button onclick="requestCity('Lagos')" class="text-sm bg-white border border-[#ddd8d0] hover:border-[#c4511c] px-3 py-1 rounded-full transition">Lagos 🇳🇬</button>
                <button onclick="requestCity('Accra')" class="text-sm bg-white border border-[#ddd8d0] hover:border-[#c4511c] px-3 py-1 rounded-full transition">Accra 🇬🇭</button>
                <button onclick="requestCity('Cape Town')" class="text-sm bg-white border border-[#ddd8d0] hover:border-[#c4511c] px-3 py-1 rounded-full transition">Cape Town 🇿🇦</button>
                <button onclick="requestCity('Dar es Salaam')" class="text-sm bg-white border border-[#ddd8d0] hover:border-[#c4511c] px-3 py-1 rounded-full transition">Dar es Salaam 🇹🇿</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, where, addDoc, serverTimestamp } from '/roamblr-web/js/firebase.js';
        import { showToast } from '/roamblr-web/js/toast.js';

        // Function to generate skeleton cards
        function showSkeletonCards(count = 6) {
            const container = document.getElementById('loading');
            let html = '';
            for (let i = 0; i < count; i++) {
                html += `
                    <div class="bg-white rounded-2xl p-6 border border-[#eeebe6]">
                        <div class="flex items-center justify-between mb-4">
                            <div class="skeleton w-12 h-12 rounded-full"></div>
                            <div class="skeleton w-20 h-6 rounded-full"></div>
                        </div>
                        <div class="skeleton h-7 w-32 mb-2"></div>
                        <div class="skeleton h-5 w-24 mb-3"></div>
                        <div class="flex gap-2">
                            <div class="skeleton h-6 w-16 rounded-full"></div>
                            <div class="skeleton h-6 w-16 rounded-full"></div>
                            <div class="skeleton h-6 w-16 rounded-full"></div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Load cities
        async function loadCities() {
            try {
                showSkeletonCards(6);
                
                // Get all cities
                const citiesSnapshot = await getDocs(collection(db, "cities"));
                
                // Get creator counts per city
                const cities = [];
                
                for (const cityDoc of citiesSnapshot.docs) {
                    const cityData = cityDoc.data();
                    
                    // Count approved creators in this city
                    const creatorsQuery = query(
                        collection(db, "creators"),
                        where("city", "==", cityDoc.id),
                        where("status", "==", "approved")
                    );
                    const creatorsSnapshot = await getDocs(creatorsQuery);
                    
                    cities.push({
                        id: cityDoc.id,
                        ...cityData,
                        creatorCount: creatorsSnapshot.size
                    });
                }

                // Hide loading, show grid
                document.getElementById('loading').classList.add('hidden');
                const grid = document.getElementById('cities-grid');
                grid.classList.remove('hidden');

                if (cities.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-12 text-[#6f6f6f]">No cities available yet.</p>';
                    return;
                }

                // Render cities
                grid.innerHTML = cities.map(city => `
                    <a href="/roamblr-web/city.html?city=${city.id}" class="bg-white rounded-2xl p-6 border border-[#eeebe6] hover:border-[#c4511c] transition block">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-4xl">${city.image || '🌍'}</span>
                            <span class="bg-[#c4511c] text-white text-xs px-3 py-1 rounded-full">${city.creatorCount} creators</span>
                        </div>
                        <h3 class="text-xl font-bold mb-1">${city.name}</h3>
                        <p class="text-[#5a5a5a] text-sm mb-3">${city.country}</p>
                        <div class="flex flex-wrap gap-2">
                            ${city.tags ? city.tags.slice(0, 3).map(tag => 
                                `<span class="bg-[#f0ebe4] text-xs px-2 py-1 rounded-full">${tag.label || tag}</span>`
                            ).join('') : ''}
                        </div>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error("Error loading cities:", error);
                document.getElementById('loading').innerHTML = '<p class="text-red-600 text-center py-12">Error loading cities. Please refresh.</p>';
            }
        }

        // Handle notify form submission
        document.getElementById('notify-direct-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('notify-email').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';
            submitBtn.disabled = true;
            
            try {
                const notification = {
                    email: email,
                    city: 'unknown',
                    cityDisplay: 'General interest',
                    isLocal: false,
                    timestamp: new Date().toISOString(),
                    source: 'directory_page'
                };

                await addDoc(collection(db, "notifications"), notification);
                showToast('Thanks! We\'ll notify you when new cities launch.', 'success');
                document.getElementById('notify-email').value = '';
            } catch (error) {
                console.error("Error:", error);
                showToast('Failed to save. Please try again.', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Request specific city
        window.requestCity = function(city) {
            window.location.href = `/roamblr-web/notify.html?city=${encodeURIComponent(city)}`;
        };

        // Load cities on page load
        loadCities();
    </script>
</body>
</html>
